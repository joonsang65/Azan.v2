version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-azan}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Keep init SQL out of /docker-entrypoint-initdb.d so it is not re-run on restarts.

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/azan}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      PORT: ${PORT:-8000}
      SEED_DATA: ${SEED_DATA:-true}
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  worker:
    build:
      context: ../../workers
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/azan}
      ALERT_POLL_SECONDS: ${ALERT_POLL_SECONDS:-5}
      ALERT_BATCH_SIZE: ${ALERT_BATCH_SIZE:-50}
    depends_on:
      - postgres

volumes:
  # Service volume key is pgdata; underlying Docker volume name stays postgres_data
  # so existing data can continue to be used without reset.
  pgdata:
    name: postgres_data
