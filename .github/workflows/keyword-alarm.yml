name: Keyword Alarm Send Push Notifications

on:
  workflow_dispatch:

jobs:
  send-notifications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r workers/alarm/keyword_match/requirements.txt

      - name: Send push notifications
        env:
          DATABASE_URL: ${{ secrets.NEON_DEV_DATABASE_URL }}
        run: python workers/alarm/keyword_match/send_notifications.py
