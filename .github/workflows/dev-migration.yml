name: DB Migration

on:
  push:
    branches:
      - develop

jobs:
  migrate:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set database URL (develop -> neon dev only)
        run: echo "DATABASE_URL=${{ secrets.NEON_DEV_DATABASE_URL }}" >> "$GITHUB_ENV"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: alembic upgrade head
