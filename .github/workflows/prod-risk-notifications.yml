name: Risk Notifications (NEON_PROD / Daily)

on:
  schedule:
    - cron: "0 23 * * *"   # 08:00 KST daily
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  risk-notifications:
    name: Calculate risks and send alerts (prod)
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r workers/risk_alarm/requirements.txt

      - name: Calculate risk scores and populate outbox
        env:
          DATABASE_URL: ${{ secrets.NEON_PROD_DATABASE_URL }}
        run: python workers/risk_alarm/expo/update_risk.py

      - name: Send risk alerts via Expo
        env:
          DATABASE_URL: ${{ secrets.NEON_PROD_DATABASE_URL }}
          EXPO_ACCESS_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}
        run: python workers/risk_alarm/expo/send_risk_alerts.py
