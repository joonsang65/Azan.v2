name: "[Demo] Random Notice Push Notifications"

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-demo-notifications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install psycopg2-binary requests

      - name: Send demo push notifications
        env:
          DATABASE_URL: ${{ secrets.NEON_DEV_DATABASE_URL }}
        run: python workers/alarm/keyword_match/test_random2.py
