name: Risk Notifications (NEON_DEV / Manual)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  risk-notifications:
    name: Calculate risks and send alerts (dev, force-send)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r workers/risk_alarm/requirements.txt

      - name: Calculate risk scores and populate outbox (force-send)
        env:
          DATABASE_URL: ${{ secrets.NEON_DEV_DATABASE_URL }}
          FORCE_SEND: "true"
        run: python workers/risk_alarm/expo/update_risk.py

      - name: Send risk alerts via Expo
        env:
          DATABASE_URL: ${{ secrets.NEON_DEV_DATABASE_URL }}
          EXPO_ACCESS_TOKEN: ${{ secrets.EXPO_ACCESS_TOKEN }}
          FORCE_SEND: "true"
        run: python workers/risk_alarm/expo/send_risk_alerts.py
